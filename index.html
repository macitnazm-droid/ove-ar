<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Ove AR Nail Try-On</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;-webkit-user-select:none}
#cam{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%}
#status{position:absolute;top:env(safe-area-inset-top,40px);left:0;right:0;text-align:center;color:#fff;font:600 14px/1.4 -apple-system,sans-serif;z-index:10;text-shadow:0 1px 4px rgba(0,0,0,0.7);padding-top:10px}
#flip{position:absolute;top:env(safe-area-inset-top,40px);right:16px;width:40px;height:40px;border-radius:20px;background:rgba(0,0,0,0.5);border:none;color:#fff;font-size:20px;z-index:20;display:flex;align-items:center;justify-content:center;padding-top:10px}
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
<div id="status">Yukleniyor...</div>
<button id="flip" onclick="flipCam()">🔄</button>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js"></script>
<script>
const cam = document.getElementById('cam');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
let currentColor = '#D4547A';
let facingMode = 'environment'; // arka kamera varsayilan

// Tirnak uclari (MediaPipe Hands: 4,8,12,16,20 = parmak uclari)
// DIP eklemleri (3,7,11,15,19 = tirnak tabani)
const NAILS = [
  {tip:4, dip:3, pip:2},   // basparmak
  {tip:8, dip:7, pip:6},   // isaret
  {tip:12,dip:11,pip:10},  // orta
  {tip:16,dip:15,pip:14},  // yuzuk
  {tip:20,dip:19,pip:18},  // serce
];

let hands;
let camera;

async function init() {
  statusEl.textContent = 'AI modeli yukleniyor...';
  
  hands = new Hands({locateFile: (file) => {
    return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/' + file;
  }});
  
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.5,
  });
  
  hands.onResults(onResults);
  
  statusEl.textContent = 'Kamera aciliyor...';
  startCamera();
}

function startCamera() {
  if (camera) camera.stop();
  
  camera = new Camera(cam, {
    onFrame: async () => {
      await hands.send({image: cam});
    },
    facingMode: facingMode,
    width: 640,
    height: 480,
  });
  
  camera.start().then(() => {
    canvas.width = cam.videoWidth || 640;
    canvas.height = cam.videoHeight || 480;
    statusEl.textContent = '';
  }).catch(e => {
    statusEl.textContent = 'Kamera erisimi reddedildi';
  });
}

function flipCam() {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  startCamera();
}

function onResults(results) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    statusEl.textContent = '';
    for (const landmarks of results.multiHandLandmarks) {
      drawNails(landmarks);
    }
  } else {
    statusEl.textContent = 'Elini kameraya goster';
  }
}

function drawNails(lm) {
  const w = canvas.width;
  const h = canvas.height;
  
  for (const nail of NAILS) {
    const tip = lm[nail.tip];
    const dip = lm[nail.dip];
    const pip = lm[nail.pip];
    
    const tx = tip.x * w, ty = tip.y * h;
    const dx = dip.x * w, dy = dip.y * h;
    const px = pip.x * w, py = pip.y * h;
    
    // Tirnak boyutu: tip-dip mesafesi
    const segLen = Math.sqrt((tx-dx)**2 + (ty-dy)**2);
    const nailW = segLen * 0.55;  // daha dar
    const nailH = segLen * 0.65;  // daha kisa
    
    // Tirnak merkezi: tip ile dip arasi, tip'e yakin
    const cx = dx + (tx - dx) * 0.55;
    const cy = dy + (ty - dy) * 0.55;
    
    // Aci: parmak yonu
    const angle = Math.atan2(ty - dy, tx - dx);
    
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle - Math.PI / 2);
    
    // Tirnak sekli — yumusak dikdortgen (gercekci)
    const r = nailW * 0.4; // ust koseler yuvarlak
    ctx.beginPath();
    ctx.moveTo(-nailW/2, nailH/3);
    ctx.lineTo(-nailW/2, -nailH/3 + r);
    ctx.quadraticCurveTo(-nailW/2, -nailH/2, -nailW/2 + r, -nailH/2);
    ctx.lineTo(nailW/2 - r, -nailH/2);
    ctx.quadraticCurveTo(nailW/2, -nailH/2, nailW/2, -nailH/3 + r);
    ctx.lineTo(nailW/2, nailH/3);
    ctx.quadraticCurveTo(nailW/2, nailH/2, 0, nailH/2); // alt kose badem
    ctx.quadraticCurveTo(-nailW/2, nailH/2, -nailW/2, nailH/3);
    ctx.closePath();
    
    // Renk dolgu — yarı saydam
    ctx.fillStyle = currentColor + 'BB';
    ctx.fill();
    
    // Parlama efekti
    ctx.beginPath();
    ctx.ellipse(-nailW*0.12, -nailH*0.15, nailW*0.12, nailH*0.18, -0.2, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fill();
    
    // Ince kenar
    ctx.beginPath();
    ctx.moveTo(-nailW/2, nailH/3);
    ctx.lineTo(-nailW/2, -nailH/3 + r);
    ctx.quadraticCurveTo(-nailW/2, -nailH/2, -nailW/2 + r, -nailH/2);
    ctx.lineTo(nailW/2 - r, -nailH/2);
    ctx.quadraticCurveTo(nailW/2, -nailH/2, nailW/2, -nailH/3 + r);
    ctx.lineTo(nailW/2, nailH/3);
    ctx.quadraticCurveTo(nailW/2, nailH/2, 0, nailH/2);
    ctx.quadraticCurveTo(-nailW/2, nailH/2, -nailW/2, nailH/3);
    ctx.closePath();
    ctx.strokeStyle = currentColor + '66';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    
    ctx.restore();
  }
}

// React Native'den renk degisikligi al
window.addEventListener('message', e => {
  try { const d = JSON.parse(e.data); if (d.type === 'setColor') currentColor = d.hex; } catch {}
});
document.addEventListener('message', e => {
  try { const d = JSON.parse(e.data); if (d.type === 'setColor') currentColor = d.hex; } catch {}
});

init();
</script>
</body>
</html>
