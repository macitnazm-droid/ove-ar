<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Ove Nail Try-On</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#FAFAF8;color:#2C2422;min-height:100vh}
#YMK-module{width:100%;max-width:500px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:env(safe-area-inset-top,12px)}
.header h1{font-size:18px;font-weight:700;flex:1;text-align:center}
.colors{padding:12px 16px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
.color-btn{display:inline-block;width:36px;height:36px;border-radius:18px;border:2px solid #EAD9D4;margin:0 4px;cursor:pointer;vertical-align:middle}
.color-btn.active{border:3px solid #2C2422;transform:scale(1.15)}
.textures{padding:8px 16px;overflow-x:auto;white-space:nowrap}
.tex-btn{display:inline-block;padding:6px 14px;border-radius:16px;background:#F5EAE5;color:#6E6B68;font-size:12px;margin:0 3px;cursor:pointer;border:none}
.tex-btn.active{background:#C4A49A;color:#fff}
.capture-btn{display:block;margin:16px auto;padding:14px 32px;background:#3A3230;color:#fff;border:none;border-radius:28px;font-size:16px;font-weight:600;cursor:pointer}
.result-img{width:100%;max-width:400px;display:block;margin:12px auto;border-radius:16px}
.status{text-align:center;padding:20px;color:#6E6B68;font-size:14px}
.loading{text-align:center;padding:40px;color:#C4A49A;font-size:16px;font-weight:600}
.retry-btn{display:block;margin:8px auto;padding:10px 24px;background:#F5EAE5;color:#C4A49A;border:none;border-radius:20px;font-size:14px;cursor:pointer}
.book-btn{display:block;margin:16px auto;padding:14px 32px;background:#3A3230;color:#fff;border:none;border-radius:28px;font-size:16px;font-weight:600;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <h1>Nail Try-On</h1>
</div>

<!-- Renk paleti -->
<div class="colors" id="colorPicker"></div>

<!-- Doku secici -->
<div class="textures" id="texturePicker"></div>

<!-- Camera Kit mount point -->
<div id="YMK-module"></div>

<!-- Sonuc -->
<div id="result"></div>

<!-- Kamera ac butonu -->
<button class="capture-btn" id="openBtn" onclick="openCamera()">Kamerayi Ac</button>

<script>
const API_KEY = 'sk-GPSJTU66g_xl7fvLeWKfnchi-PJFiyKemy7nT-h52MvH6BPzdWMF6R-8tKzrDlbx';
const API_BASE = 'https://yce-api-01.makeupar.com/s2s/v2.0';

const COLORS = [
  {id:'rose',label:'Rose Gold',hex:'#D4547A'},
  {id:'red',label:'Kirmizi',hex:'#CC0000'},
  {id:'nude',label:'Nude',hex:'#E8C5B0'},
  {id:'blush',label:'Blush',hex:'#F2C4CE'},
  {id:'berry',label:'Berry',hex:'#8B2252'},
  {id:'wine',label:'Bordo',hex:'#722F37'},
  {id:'coral',label:'Mercan',hex:'#FF6B6B'},
  {id:'pink',label:'Hot Pink',hex:'#FF69B4'},
  {id:'lavender',label:'Lavanta',hex:'#E6CDFF'},
  {id:'mint',label:'Nane',hex:'#98D8C8'},
  {id:'gold',label:'Altin',hex:'#C9A84C'},
  {id:'black',label:'Siyah',hex:'#2D2D2D'},
  {id:'white',label:'Beyaz',hex:'#F8F8F8'},
  {id:'sky',label:'Mavi',hex:'#87CEEB'},
];

const TEXTURES = [
  {id:'cream',label:'Krem'},
  {id:'matte',label:'Mat'},
  {id:'metallic',label:'Metalik'},
  {id:'shimmer_fine',label:'Simli'},
  {id:'pearl',label:'Inci'},
];

let selectedColor = COLORS[0];
let selectedTexture = TEXTURES[0];

// Renk palette render
const colorDiv = document.getElementById('colorPicker');
COLORS.forEach(c => {
  const btn = document.createElement('span');
  btn.className = 'color-btn' + (c.id === selectedColor.id ? ' active' : '');
  btn.style.backgroundColor = c.hex;
  btn.onclick = () => {
    selectedColor = c;
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // RN'e bildir
    if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(JSON.stringify({type:'colorChanged',hex:c.hex,label:c.label}));
  };
  colorDiv.appendChild(btn);
});

// Doku render
const texDiv = document.getElementById('texturePicker');
TEXTURES.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'tex-btn' + (t.id === selectedTexture.id ? ' active' : '');
  btn.textContent = t.label;
  btn.onclick = () => {
    selectedTexture = t;
    document.querySelectorAll('.tex-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  };
  texDiv.appendChild(btn);
});

// Camera Kit init
window.YMKAsyncInit = function() {
  YMK.addEventListener('loaded', function() {
    console.log('Camera Kit loaded');
  });

  YMK.addEventListener('faceDetectionCaptured', function(capturedResult) {
    YMK.close();
    document.getElementById('openBtn').style.display = 'block';
    
    if (capturedResult.images && capturedResult.images.length > 0) {
      const imgData = capturedResult.images[0].image;
      processNail(imgData);
    }
  });

  YMK.addEventListener('cameraFailed', function(err) {
    document.getElementById('result').innerHTML = '<p class="status">Kamera erisimi reddedildi</p>';
    document.getElementById('openBtn').style.display = 'block';
  });
};

function openCamera() {
  document.getElementById('openBtn').style.display = 'none';
  document.getElementById('result').innerHTML = '';
  
  YMK.init({
    faceDetectionMode: 'nail',
    imageFormat: 'base64',
    language: 'enu',
    hideFlipCameraButton: false,
  });
  YMK.openCameraKit();
}

async function processNail(base64Image) {
  const resultDiv = document.getElementById('result');
  resultDiv.innerHTML = '<p class="loading">AI tirnaklarini boyuyor...</p>';

  try {
    // base64'ten data URI prefix'ini kaldir
    const raw = base64Image.replace(/^data:image\/\w+;base64,/, '');
    
    // Blob olustur ve upload et
    const byteChars = atob(raw);
    const byteArray = new Uint8Array(byteChars.length);
    for (let i = 0; i < byteChars.length; i++) byteArray[i] = byteChars.charCodeAt(i);
    const blob = new Blob([byteArray], {type: 'image/jpeg'});

    // 1. Upload
    const uploadRes = await fetch(API_BASE + '/file/nail-vto', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + API_KEY,
        'Content-Type': 'application/octet-stream',
      },
      body: blob,
    });
    const uploadData = await uploadRes.json();
    if (!uploadData?.data?.file_id) throw new Error('Yukleme basarisiz');

    // 2. Task olustur
    const fingers = ['thumb','index','middle','ring','pinky'];
    const effects = fingers.map(f => ({
      sub_type: 'color',
      finger: f,
      color: selectedColor.hex,
      texture: selectedTexture.id,
      transparency: 0,
      reflection: 20,
      contrast: 10,
      roughness: 0,
    }));

    const taskRes = await fetch(API_BASE + '/task/nail-vto', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + API_KEY,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        version: '1.0',
        src_file_id: uploadData.data.file_id,
        effect_type: 'nail_polish',
        ref_file_ids: [],
        effects: effects,
      }),
    });
    const taskData = await taskRes.json();
    if (!taskData?.data?.task_id) throw new Error('Task olusturulamadi');

    // 3. Poll
    for (let i = 0; i < 15; i++) {
      await new Promise(r => setTimeout(r, 2000));
      const statusRes = await fetch(API_BASE + '/task/nail-vto/' + taskData.data.task_id, {
        headers: {'Authorization': 'Bearer ' + API_KEY},
      });
      const statusData = await statusRes.json();

      if (statusData?.data?.task_status === 'success') {
        resultDiv.innerHTML = 
          '<img class="result-img" src="' + statusData.data.results.url + '" />' +
          '<button class="retry-btn" onclick="openCamera()">Tekrar Dene</button>' +
          '<button class="book-btn" onclick="bookNow()">Bu Rengi Al &rarr;</button>';
        
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(JSON.stringify({type:'result',url:statusData.data.results.url}));
        }
        return;
      }

      if (statusData?.data?.task_status === 'fail') {
        throw new Error(statusData.data.error || 'El tespit edilemedi');
      }
    }
    throw new Error('Zaman asimi');

  } catch(e) {
    resultDiv.innerHTML = 
      '<p class="status">' + (e.message || 'Bir hata olustu') + '</p>' +
      '<button class="retry-btn" onclick="openCamera()">Tekrar Dene</button>';
  }
}

function bookNow() {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({type:'book'}));
  }
}

// RN'den renk degisikligi al
window.addEventListener('message', e => {
  try {
    const d = JSON.parse(e.data);
    if (d.type === 'setColor') {
      const c = COLORS.find(x => x.hex === d.hex);
      if (c) {
        selectedColor = c;
        document.querySelectorAll('.color-btn').forEach((b,i) => {
          b.classList.toggle('active', COLORS[i].id === c.id);
        });
      }
    }
  } catch {}
});
</script>

<!-- YouCam Camera Kit SDK -->
<script src="https://plugins-media.makeupar.com/v2.4-camera-kit/sdk.js"></script>

</body>
</html>
