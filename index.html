<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#videoEl{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#canvas{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1)}
#status{position:absolute;top:40px;left:0;right:0;text-align:center;color:#fff;font-family:sans-serif;font-size:13px;opacity:0.8;z-index:10;text-shadow:0 1px 3px rgba(0,0,0,0.5)}
</style>
</head>
<body>
<video id="videoEl" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="status">Yukleniyor...</div>
<script type="module">
import {HandLandmarker,FilesetResolver} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/+esm";
let handLandmarker,currentColor="#D4547A",animId;
const video=document.getElementById("videoEl"),canvas=document.getElementById("canvas"),ctx=canvas.getContext("2d"),statusEl=document.getElementById("status");
const NAILS=[{tip:4,dip:3},{tip:8,dip:7},{tip:12,dip:11},{tip:16,dip:15},{tip:20,dip:19}];
async function init(){try{statusEl.textContent="AI modeli yukleniyor...";const vision=await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/wasm");handLandmarker=await HandLandmarker.createFromOptions(vision,{baseOptions:{modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",delegate:"GPU"},runningMode:"VIDEO",numHands:2,minHandDetectionConfidence:0.5,minHandPresenceConfidence:0.5,minTrackingConfidence:0.5});statusEl.textContent="Kamera aciliyor...";startCamera()}catch(e){statusEl.textContent="Hata: "+e.message}}
async function startCamera(){try{const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user",width:{ideal:640},height:{ideal:480}}});video.srcObject=stream;video.onloadeddata=()=>{canvas.width=video.videoWidth;canvas.height=video.videoHeight;statusEl.textContent="";detect()}}catch(e){statusEl.textContent="Kamera erisimi reddedildi"}}
function detect(){if(!handLandmarker||video.readyState<2){animId=requestAnimationFrame(detect);return}const results=handLandmarker.detectForVideo(video,performance.now());ctx.clearRect(0,0,canvas.width,canvas.height);if(results.landmarks&&results.landmarks.length>0){statusEl.textContent="";for(const hand of results.landmarks)drawNails(hand)}else{statusEl.textContent="Elini kameraya goster"}animId=requestAnimationFrame(detect)}
function drawNails(lm){const w=canvas.width,h=canvas.height;for(const{tip,dip}of NAILS){const tx=lm[tip].x*w,ty=lm[tip].y*h,dx=lm[dip].x*w,dy=lm[dip].y*h;const dist=Math.sqrt((tx-dx)**2+(ty-dy)**2),nw=dist*0.7,nh=dist*0.8;const angle=Math.atan2(ty-dy,tx-dx),cx=tx-(tx-dx)*0.2,cy=ty-(ty-dy)*0.2;ctx.save();ctx.translate(cx,cy);ctx.rotate(angle-Math.PI/2);ctx.beginPath();ctx.ellipse(0,0,nw/2,nh/2,0,0,Math.PI*2);ctx.fillStyle=currentColor+"CC";ctx.fill();ctx.beginPath();ctx.ellipse(-nw*0.15,-nh*0.2,nw*0.15,nh*0.2,-0.3,0,Math.PI*2);ctx.fillStyle="rgba(255,255,255,0.3)";ctx.fill();ctx.restore()}}
window.addEventListener("message",e=>{try{const d=JSON.parse(e.data);if(d.type==="setColor")currentColor=d.hex}catch{}});
document.addEventListener("message",e=>{try{const d=JSON.parse(e.data);if(d.type==="setColor")currentColor=d.hex}catch{}});
init();
</script>
</body>
</html>
