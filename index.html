<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Ove AR Nail Try-On</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;-webkit-user-select:none}
#cam{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%}
#segCanvas{display:none}
#status{position:absolute;top:env(safe-area-inset-top,40px);left:0;right:0;text-align:center;color:#fff;font:600 14px/1.4 -apple-system,sans-serif;z-index:10;text-shadow:0 1px 4px rgba(0,0,0,0.7);padding-top:10px}
#flip{position:absolute;top:env(safe-area-inset-top,40px);right:16px;width:40px;height:40px;border-radius:20px;background:rgba(0,0,0,0.5);border:none;color:#fff;font-size:18px;z-index:20;padding-top:10px}
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
<canvas id="segCanvas"></canvas>
<div id="status">Yukleniyor...</div>
<button id="flip" onclick="flipCam()">🔄</button>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.10/dist/tf-tflite.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js"></script>
<script>
const cam = document.getElementById('cam');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
const segCanvas = document.getElementById('segCanvas');
const segCtx = segCanvas.getContext('2d');
const statusEl = document.getElementById('status');

let currentColor = '#D4547A';
let facingMode = 'environment';
let hands, camera;

// Rengi RGB'ye cevir
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}

const NAILS = [
  {tip:4,dip:3,pip:2},
  {tip:8,dip:7,pip:6},
  {tip:12,dip:11,pip:10},
  {tip:16,dip:15,pip:14},
  {tip:20,dip:19,pip:18},
];

async function init() {
  statusEl.textContent = 'AI modeli yukleniyor...';
  
  hands = new Hands({locateFile: f => 
    'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/' + f
  });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.5,
  });
  hands.onResults(onResults);
  
  statusEl.textContent = 'Kamera aciliyor...';
  startCamera();
}

function startCamera() {
  if (camera) camera.stop();
  camera = new Camera(cam, {
    onFrame: async () => { await hands.send({image: cam}); },
    facingMode: facingMode,
    width: 640, height: 480,
  });
  camera.start().then(() => {
    canvas.width = cam.videoWidth || 640;
    canvas.height = cam.videoHeight || 480;
    segCanvas.width = canvas.width;
    segCanvas.height = canvas.height;
    statusEl.textContent = '';
  }).catch(() => {
    statusEl.textContent = 'Kamera erisimi reddedildi';
  });
}

function flipCam() {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  startCamera();
}

function onResults(results) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    statusEl.textContent = 'Elini kameraya goster';
    return;
  }
  
  statusEl.textContent = '';
  
  // Kamera frame'ini segCanvas'a ciz
  segCtx.drawImage(cam, 0, 0, canvas.width, canvas.height);
  const frame = segCtx.getImageData(0, 0, canvas.width, canvas.height);
  const pixels = frame.data;
  const [cr, cg, cb] = hexToRgb(currentColor);
  
  for (const landmarks of results.multiHandLandmarks) {
    for (const nail of NAILS) {
      const tip = landmarks[nail.tip];
      const dip = landmarks[nail.dip];
      
      const tx = tip.x * canvas.width, ty = tip.y * canvas.height;
      const dx = dip.x * canvas.width, dy = dip.y * canvas.height;
      
      const segLen = Math.sqrt((tx-dx)**2 + (ty-dy)**2);
      const nailW = segLen * 0.45;
      const nailH = segLen * 0.55;
      
      const cx = dx + (tx - dx) * 0.5;
      const cy = dy + (ty - dy) * 0.5;
      const angle = Math.atan2(ty - dy, tx - dx) - Math.PI/2;
      
      // Tirnak bolgesindeki pikselleri tara
      const cosA = Math.cos(-angle), sinA = Math.sin(-angle);
      const searchR = Math.max(nailW, nailH);
      
      const minX = Math.max(0, Math.floor(cx - searchR));
      const maxX = Math.min(canvas.width-1, Math.ceil(cx + searchR));
      const minY = Math.max(0, Math.floor(cy - searchR));
      const maxY = Math.min(canvas.height-1, Math.ceil(cy + searchR));
      
      for (let y = minY; y <= maxY; y++) {
        for (let x = minX; x <= maxX; x++) {
          // Pikseli tirnak koordinat sistemine donustur
          const lx = (x - cx) * cosA - (y - cy) * sinA;
          const ly = (x - cx) * sinA + (y - cy) * cosA;
          
          // Elips ici mi kontrol
          const ex = (lx / (nailW/2)) ** 2;
          const ey = (ly / (nailH/2)) ** 2;
          
          if (ex + ey <= 1.0) {
            const idx = (y * canvas.width + x) * 4;
            const origR = pixels[idx];
            const origG = pixels[idx+1];
            const origB = pixels[idx+2];
            
            // Luminance koru — orijinal parlakligi al
            const lum = (origR * 0.299 + origG * 0.587 + origB * 0.114) / 255;
            
            // Kenardan merkeze gecis (feather)
            const dist = Math.sqrt(ex + ey);
            const alpha = dist > 0.75 ? 1.0 - (dist - 0.75) / 0.25 : 1.0;
            const blend = 0.65 * alpha; // %65 renk, %35 orijinal
            
            // Renk karistir — luminance-preserving blend
            const finalR = Math.round(origR * (1 - blend) + cr * lum * blend + cr * 0.3 * blend);
            const finalG = Math.round(origG * (1 - blend) + cg * lum * blend + cg * 0.3 * blend);
            const finalB = Math.round(origB * (1 - blend) + cb * lum * blend + cb * 0.3 * blend);
            
            pixels[idx] = Math.min(255, finalR);
            pixels[idx+1] = Math.min(255, finalG);
            pixels[idx+2] = Math.min(255, finalB);
          }
        }
      }
    }
  }
  
  ctx.putImageData(frame, 0, 0);
}

window.addEventListener('message', e => {
  try { const d = JSON.parse(e.data); if (d.type === 'setColor') currentColor = d.hex; } catch {}
});
document.addEventListener('message', e => {
  try { const d = JSON.parse(e.data); if (d.type === 'setColor') currentColor = d.hex; } catch {}
});

init();
</script>
</body>
</html>
